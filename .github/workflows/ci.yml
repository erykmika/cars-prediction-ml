name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  api:
    name: Lint and test API
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Lint API
        run: uv run ruff check .

      - name: Test API
        run: uv run pytest -q

  training:
    name: Lint training
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: training
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Lint training
        run: uv run ruff check .
